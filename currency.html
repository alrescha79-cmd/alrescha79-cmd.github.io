<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="src/css/currency.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FontAweome CDN Link for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4604559541221187"
        crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="src/img/currency.svg" type="image/x-icon">
    <title>Konversi Mata Uang</title>
</head>

<body>
    <div class="wrapper">
        <header><img src="src/img/arrow-back.svg" alt="">Konversi Mata Uang</header>
        <form action="#">
            <div class="amount">
                <p>Masukkan Jumlah</p>
                <input type="text" value="1">
            </div>
            <div class="drop-list">
                <div class="from">
                    <p>Dari</p>
                    <div class="select-box">
                        <img src="https://flagcdn.com/48x36/us.png" alt="flag">
                        <select>
                            <!-- Options tag are inserted from JavaScript -->
                        </select>
                    </div>
                </div>
                <div class="icon"><i class="fas fa-exchange-alt"></i></div>
                <div class="to">
                    <p>Ke</p>
                    <div class="select-box">
                        <img src="https://flagcdn.com/48x36/id.png" alt="flag">
                        <select>
                            <!-- Options tag are inserted from JavaScript -->
                        </select>
                    </div>
                </div>
            </div>
            <div class="exchange-rate">Mendapatkan nilai tukar...</div>
            <button>Konversi</button>
        </form>
    </div>

    <script src="src/js/country-list.js"></script>
    <script src="src/js/currency.js"></script>

</body>

</html>
