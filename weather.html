<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="src/css/weather.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Linking BoxIcon for Icon -->
    <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4604559541221187"
        crossorigin="anonymous"></script>
    <link rel="icon" href="src/img/weather-hail-day-48-regular.svg">
    <title>Prakiraan Cuaca</title>
</head>

<body>
    <div class="wrapper">
        <header><i class='bx bx-left-arrow-alt'></i>Prakiraan Cuaca</header>
        <section class="input-part">
            <p class="info-txt"></p>
            <div class="content">
                <div class="input-cari">
                <input type="text" spellcheck="false" placeholder="Masukkan Kota " required>
                <button class="btn-cari" onclick="requestApi(inputField.value)"><img src="src/img/search.svg" alt=""></button>
                </div>
                <div class="separator"></div>
                <button class="btn-lokasi">Lokasi Saya</button>
            </div>
        </section>
        <section class="weather-part">
            <img src="src/img/weather-hail-day-48-regular.svg" alt="Weather Icon">
            <div class="temp">
                <span class="numb">_</span>
                <span class="deg">°</span>C
            </div>
            <div class="weather">_ _</div>
            <div class="location">
                <i class='bx bx-map'></i>
                <span>_, _</span>
            </div>
            <div class="bottom-details">
                <div class="column feels">
                    <i class='bx bxs-thermometer'></i>
                    <div class="details">
                        <div class="temp">
                            <span class="numb-2">_</span>
                            <span class="deg">°</span>C
                        </div>
                        <p>Terasa seperti</p>
                    </div>
                </div>
                <div class="column humidity">
                    <i class='bx bxs-droplet-half'></i>
                    <div class="details">
                        <span>_</span>
                        <p>Kelembapan</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="src/js/weather.js"></script>

</body>

</html>
