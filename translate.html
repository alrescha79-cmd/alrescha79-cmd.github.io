<!DOCTYPE html>
<!-- Coding By CodingNepal - youtube.com/codingnepal -->
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="src/css/translate.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome CDN Link for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4604559541221187"
        crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="src/img/translate.svg" type="image/x-icon">
    <title>Terjemahan Gratis</title>
</head>

<body>
    <div class="container">
        <header><img src="src/img/arrow-back.svg" alt="">Penerjemah Bahasa</header>
        <div class="wrapper">
            <div class="text-input">
                <textarea spellcheck="false" class="from-text" placeholder="Masukkan kata atau kalimat"></textarea>
                <textarea spellcheck="false" readonly disabled class="to-text" placeholder="Terjemahan"></textarea>
            </div>
            <ul class="controls">
                <li class="row from">
                    <div class="icons">
                        <i id="from" class="fas fa-volume-up"></i>
                        <i id="from" class="fas fa-copy"></i>
                    </div>
                    <select></select>
                </li>
                <li class="exchange"><i class="fas fa-exchange-alt"></i></li>
                <li class="row to">
                    <select></select>
                    <div class="icons">
                        <i id="to" class="fas fa-volume-up"></i>
                        <i id="to" class="fas fa-copy"></i>
                    </div>
                </li>
            </ul>
        </div>
        <button>Terjemahkan</button>
    </div>

    <script src="src/js/countries.js"></script>
    <script src="src/js/translate.js"></script>

</body>

</html>
